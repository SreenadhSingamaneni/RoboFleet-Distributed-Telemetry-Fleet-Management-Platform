name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test backend
        working-directory: backend
        run: ./mvnw --batch-mode --no-transfer-progress verify

  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install, test, and build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

  simulator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Test simulator
        working-directory: simulator
        run: |
          python -m pip install -e ".[dev]"
          ruff check .
          pytest

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, dashboard, simulator]
    strategy:
      matrix:
        component: [backend, dashboard, simulator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: false
          tags: fleet-${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

